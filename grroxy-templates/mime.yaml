id: create-mime-labels

info:
  title: Create Mime labels
  author: Grroxy
  description: Analyse mime and create labels in organizer

config:
  type: actions
  mode: any
  hooks:
    proxy: [response]

tasks:
  - id: default
    todo:
    - create_label:
        name: "{{resp.mime}}"
        type: mime
        color: ignore

  - id: task-image-mime
    condition: resp.mime ~ 'image/'
    todo:
      - create_label:
          name: images
          type: mime
          color: ignore

  - id: task-audio-mime
    condition: resp.mime ~ 'audio/'
    todo:
      - create_label:
          name: audio
          type: mime
          color: purple

  - id: task-video-mime
    condition: resp.mime ~ 'video/'
    todo:
      - create_label:
          name: video
          type: mime
          color: pink

  - id: task-javascript-mime
    condition: resp.mime ~ 'javascript'
    todo:
      - create_label:
          name: javascript
          type: mime
          color: yellow

  - id: task-json-mime
    condition: resp.mime ~ 'json'
    todo:
      - create_label:
          name: json
          type: mime
          color: lightyellow

  - id: task-css-mime
    condition: resp.mime ~ 'css'
    todo:
      - create_label:
          name: css
          type: mime
          color: ignore

  - id: task-font-mime
    condition: resp.mime ~ 'font'
    todo:
      - create_label:
          name: font
          type: mime
          color: red

  - id: task-html-mime
    condition: resp.mime ~ 'html'
    todo:
      - create_label:
          name: html
          type: mime
          color: orange

  - id: task-xml-mime
    condition: resp.mime ~ 'xml'
    todo:
      - create_label:
          name: "{{resp.mime}}"
          type: mime
          color: orange

  - id: task-ocsp-mime
    condition: resp.mime ~ 'ocsp-response'
    todo:
      - create_label:
          name: "{{resp.mime}}"
          type: mime
          color: ignore

  - id: task-text-mime
    condition: resp.mime ~ 'text'
    todo:
      - create_label:
          name: "{{resp.mime}}"
          type: mime
          color: ignore

  - id: task-binary-mime
    condition: resp.mime ~ 'binary'
    todo:
      - create_label:
          name: "{{resp.mime}}"
          type: mime
          color: green

  - id: task-octet-mime
    condition: resp.mime ~ 'octet'
    todo:
      - create_label:
          name: "{{resp.mime}}"
          type: mime
          color: blue

  - id: task-protobuf-mime
    condition: resp.mime ~ 'protobuf'
    todo:
      - create_label:
          name: "{{resp.mime}}"
          type: mime
          color: green
