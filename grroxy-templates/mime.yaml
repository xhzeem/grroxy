id: create-mime-labels

info:
  title: Create Mime labels
  author: Grroxy
  description: Analyse mime and create labels in organizer

config:
  type: actions
  mode: any
  hooks:
    proxy: [response]
  default:
    - create_label:
        name: "{{resp.mime}}"
        type: mime
        color: ignore

tasks:
  - condition: resp.mime ~ 'image/svg%'
    todo:
      - create_label:
          name: "{{resp.mime}}"
          type: mime
          color: ignore

  - condition: resp.mime ~ 'image/'
    todo:
      - create_label:
          name: images
          type: mime
          color: ignore

  - condition: resp.mime ~ 'audio/'
    todo:
      - create_label:
          name: audio
          type: mime
          color: purple

  - condition: resp.mime ~ 'video/'
    todo:
      - create_label:
          name: video

          type: mime
          color: pink

  - condition: resp.mime ~ 'javascript'
    todo:
      - create_label:
          name: "{{resp.mime}}"
          type: mime
          color: yellow

  - condition: resp.mime ~ 'json'
    todo:
      - create_label:
          name: "{{resp.mime}}"
          type: mime
          color: lightyellow

  - condition: resp.mime ~ 'css'
    todo:
      - create_label:
          name: "{{resp.mime}}"
          type: mime
          color: ignore

  - condition: resp.mime ~ 'font'
    todo:
      - create_label:
          name: "{{resp.mime}}"
          type: mime
          color: red

  - condition: resp.mime ~ 'html'
    todo:
      - create_label:
          name: "{{resp.mime}}"
          type: mime
          color: orange

  - condition: resp.mime ~ 'xml'
    todo:
      - create_label:
          name: "{{resp.mime}}"
          type: mime
          color: orange

  - condition: resp.mime ~ 'ocsp-response'
    todo:
      - create_label:
          name: "{{resp.mime}}"
          type: mime
          color: ignore

  - condition: resp.mime ~ 'text'
    todo:
      - create_label:
          name: "{{resp.mime}}"
          type: mime
          color: ignore

  - condition: resp.mime ~ 'binary'
    todo:
      - create_label:
          name: "{{resp.mime}}"
          type: mime
          color: green

  - condition: resp.mime ~ 'octet'
    todo:
      - create_label:
          name: "{{resp.mime}}"
          type: mime
          color: blue

  - condition: resp.mime ~ 'protobuf'
    todo:
      - create_label:
          name: "{{resp.mime}}"
          type: mime
          color: green
