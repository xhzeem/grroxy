id: create-extension-labels

info:
  title: Create Extension labels
  author: Grroxy
  description: Analyse requests's extension and create labels in organizer

config:
  type: actions
  hooks:
    proxy: [request]
  mode: any

tasks:
  - id: default
    todo:
      - create_label:
          name: "{{req.ext}}"
          icon: doc
          type: extension
          color: ignore

  - id: task-js-ext
    condition: req.ext = '.js' OR req.ext = '.mjs' OR req.ext = '.js.gz' OR req.ext = '.es5'  OR req.ext = '.es7' OR req.ext = '.es6' OR req.ext = '.js.map' OR req.ext = '.es'
    todo:
      - create_label:
          name: "{{req.ext}}"
