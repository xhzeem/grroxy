author: Grroxy
description: Create labels based on request path
on:
  proxy:
    - request

actionslist:
  - filter: req.path ~ 'TODO'
    actions:
      - action_name: create_label
        data:
          name: TODO
          type: endpoint
          icon: todo
          color: blue

  - filter: req.path ~ 'Procfile'
    actions:
      - action_name: create_label
